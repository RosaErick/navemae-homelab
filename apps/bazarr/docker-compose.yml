name: bazarr
services:
  bazarr:
    image: linuxserver/bazarr:1.5.1
    container_name: bazarr
    hostname: bazarr
    network_mode: bridge
    environment:
      PGID: '1000'
      PUID: '1000'
      TZ: Europe/London
    ports:
    - 6767:6767
    volumes:
    - /DATA/Media/Movies:/movies
    - /DATA/Media/TV Shows:/tv
    - /DATA/AppData/bazarr/config:/config
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: '4010803200'
        reservations:
          memory: '67108864'
    cpu_shares: 90
    labels:
      icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Bazarr/icon.png
