name: flaresolverr
services:
  app:
    image: flaresolverr/flaresolverr:v3.3.16
    environment:
      CAPTCHA_SOLVER: none
      LOG_HTML: 'false'
      LOG_LEVEL: info
      PORT: '8191'
      PROMETHEUS_ENABLED: 'false'
      PROMETHEUS_PORT: '8192'
      TZ: Etc/UTC
    ports:
    - 8191:8191
    - 8192:8192
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: '1073741824'
    cpu_shares: 90
    labels:
      icon: https://avatars.githubusercontent.com/u/10577978
networks:
  default:
    name: flaresolverr_default
    external: false
